<aside class="sidebar">
    <h2 class="logo">
        Routing Demo
    </h2>

    <nav class="nav-menu">
        @for (item of navigationItems; track item.route) {
            <a
                class="nav-item"
                [routerLink]="item.route"
                routerLinkActive="active"
            >
                <span class="icon">{{ item.icon }}</span>

                <span class="label">{{ item.label }}</span>
            </a>
        }
    </nav>
</aside>
